<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Choufha Luxe – Coquette Moroccan Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffe9f0;
            --text-primary: #b84a70;
            --card-bg: rgba(255, 252, 250, 0.92);
            --shadow: 0 20px 35px -15px rgba(100, 50, 70, 0.2);
            --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --text-primary: #ffb7c5;
            --card-bg: rgba(30, 30, 50, 0.92);
            --shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: var(--bg-primary);
            transition: var(--transition);
            min-height: 100vh;
            padding: 30px 24px;
            position: relative;
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
        }

        /* 3D Parallax Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
            z-index: 1;
            transform: translate3d(0,0,0);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Header مع تأثير زجاجي */
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .header h1 {
            font-size: 4.5rem;
            background: linear-gradient(135deg, #c96a8d, #9e4a6b, #e8a3bb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 15px rgba(255,200,220,0.6);
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glass Bar متطور */
        .glass-bar {
            background: rgba(255, 248, 245, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 100px;
            padding: 12px 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 45px;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Product Card - أنيميشن عند الدخول */
        .product-card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 22px;
            transition: var(--transition);
            border: 1px solid rgba(255, 215, 225, 0.7);
            box-shadow: var(--shadow);
            animation: fadeInScale 0.5s ease backwards;
            animation-delay: calc(var(--index) * 0.05s);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .product-card:hover {
            transform: translateY(-12px) scale(1.02);
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 30px 45px -12px rgba(150, 70, 100, 0.3);
        }

        /* باقي الأنيميشنات والتحسينات */
        .btn-add-cart, .cart-btn, .whatsapp-header, .admin-header-btn {
            transition: all 0.2s ease;
        }

        .btn-add-cart:active, .cart-btn:active {
            transform: scale(0.95);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #d47a9b;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast-notify {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #d47a9b;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 3000;
            animation: slideInRight 0.3s ease;
            font-weight: 500;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* رفع الصورة */
        .upload-area {
            border: 2px dashed #f0a6bc;
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            margin: 15px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .upload-area:hover {
            background: #fff0f5;
            border-color: #d47a9b;
        }

        /* زر الوضع الليلي */
        .theme-toggle {
            background: #f8e1e9;
            border: none;
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            color: #b34164;
        }

        /* كود الخصم */
        .discount-code {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }

        .discount-code input {
            flex: 1;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid #f0a6bc;
        }

        /* مشاركة */
        .share-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* المفضلة */
        .favorite-btn {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #ffb0c0;
            transition: 0.2s;
        }

        .favorite-btn.active {
            color: #ff3b6f;
        }

        /* باقي الكلاسات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 35px;
        }

        .product-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 38px;
        }

        .product-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 12px;
            color: var(--text-primary);
        }

        .price-magic {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin: 12px 0;
        }

        .real-price {
            font-size: 1.9rem;
            font-weight: 800;
            color: #c2577e;
        }

        .old-price {
            text-decoration: line-through;
            color: #bda2ab;
        }

        .sizes-row {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .size-pill {
            background: #ffecf0;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.1s;
        }

        .size-pill:hover {
            background: #d47a9b;
            color: white;
        }

        .cart-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: -500px;
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: #fffafc;
            z-index: 1001;
            transition: 0.35s;
            padding: 28px;
            overflow-y: auto;
            box-shadow: -10px 0 40px rgba(0,0,0,0.2);
            border-radius: 40px 0 0 40px;
        }

        .cart-drawer.open {
            right: 0;
        }

        .modal-admin {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-card {
            background: white;
            max-width: 700px;
            width: 90%;
            border-radius: 60px;
            padding: 28px;
            max-height: 85vh;
            overflow: auto;
        }

        input, textarea {
            width: 100%;
            margin: 8px 0;
            padding: 12px;
            border-radius: 50px;
            border: 1px solid #f0a6bc;
        }

        button {
            cursor: pointer;
        }

        @media (max-width: 700px) {
            body { padding: 16px; }
            .header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body id="appBody">
<div class="container">
    <div class="header">
        <h1>🎀 CHOUFHA LUXE 🎀</h1>
        <p>✨ coquette moroccan edits – درهم مغربي ✨</p>
    </div>

    <div class="glass-bar">
        <div class="filter-group">
            <label>🔮 رتبي:</label>
            <select id="sortSelect">
                <option value="default">✨ افتراضي</option>
                <option value="lowToHigh">📈 الأرخص أولاً</option>
                <option value="highToLow">📉 الأغلى أولاً</option>
            </select>
        </div>
        <div class="action-buttons">
            <button class="theme-toggle" id="themeToggleBtn">🌙 وضع ليلي</button>
            <button class="cart-btn" id="openCartBtn">🛍️ السلة <span id="cartCount" class="cart-count-badge" style="background:#ff3b6f; border-radius:50%; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; font-size:0.7rem; position:absolute; top:-8px; right:-8px;">0</span></button>
            <button class="whatsapp-header" id="globalWhatsappBtn">📱 واتساب</button>
            <button class="admin-header-btn" id="openAdminBtn">👑 تعديل</button>
        </div>
    </div>

    <div id="productsGrid" class="products-grid"></div>
    <div class="spinner" id="loadingSpinner"></div>
</div>

<!-- Cart Drawer -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
    <div class="cart-header" style="display:flex; justify-content:space-between;">
        <h2 style="color:#b84a70;">🛍️ سلة التسوق</h2>
        <button id="closeCartDrawer" style="background:#f0cfda; border:none; padding:6px 15px; border-radius:50px;">✖</button>
    </div>
    <div id="cartItemsList"></div>
    <div class="discount-code" style="margin:15px 0;">
        <input type="text" id="discountCode" placeholder="كود خصم">
        <button id="applyDiscountBtn" style="background:#d47a9b; color:white;">تطبيق</button>
    </div>
    <div class="cart-total" id="cartTotalPrice" style="font-size:1.8rem; font-weight:800; text-align:center; margin:20px 0; color:#b84a70;">0.00 DH</div>
    <button id="checkoutWhatsappBtn" style="background:#25D366; width:100%; padding:14px; border:none; border-radius:50px; color:white; font-weight:bold;">📲 إرسال الطلب</button>
</div>

<!-- Admin Panel -->
<div id="adminModal" class="modal-admin">
    <div class="modal-card">
        <h2 style="color:#b84a70;">🌸 إدارة المتجر 🌸</h2>
        
        <div style="background:#ffeef4; border-radius:40px; padding:15px; margin:15px 0;">
            <h3>🎨 خلفية الموقع</h3>
            <div class="upload-area" id="uploadArea">
                📸 اضغط هنا لاختيار صورة من جهازك<br>
                <small>(ستصبح خلفية الموقع فوراً)</small>
                <input type="file" id="imageUpload" accept="image/*" style="display:none">
            </div>
            <div id="currentBgDisplay" class="current-bg-box" style="background:#f0eef2; padding:10px; border-radius:30px; margin-top:10px;"></div>
        </div>
        
        <hr>
        <h3>📦 المنتجات</h3>
        <div id="adminProductsList"></div>
        <button id="addProductAdminBtn" style="background:#d47a9b; color:white; width:100%;">➕ إضافة منتج</button>
        <br><br>
        <button id="closeAdminBtn" style="background:#b5a0a8; width:100%;">إغلاق</button>
    </div>
</div>

<script>
    // ---------- PRODUCTS ----------
    let products = [
        { id: 1, name: "🌸 شنطة فيونكة حرير", price: 220, discount: 15, image: "https://placehold.co/600x600/FFB7C5/white?text=🎀", sizes: ["S","M"], rating: 4.9, wishlist: false },
        { id: 2, name: "💖 تيشرت قلوب", price: 139, discount: 0, image: "https://placehold.co/600x600/F9C7D3/white?text=❤️", sizes: ["XS","S","M","L"], rating: 4.7, wishlist: false },
        { id: 3, name: "🎀 طقم ربطة شعر", price: 69, discount: 25, image: "https://placehold.co/600x600/F4BAC7/white?text=🎀", sizes: ["One Size"], rating: 5.0, wishlist: false }
    ];
    
    let cart = [];
    let favorites = [];
    let discountPercent = 0;
    let visitorCount = localStorage.getItem("visitorCount") || 0;
    visitorCount = parseInt(visitorCount) + 1;
    localStorage.setItem("visitorCount", visitorCount);
    console.log(`👥 عدد الزوار: ${visitorCount}`);
    
    let currentBg = "radial-gradient(circle at 10% 30%, #ffe9f0, #ffd9e4)";
    
    // Theme
    let currentTheme = localStorage.getItem("theme") || "light";
    if(currentTheme === "dark") document.body.setAttribute("data-theme", "dark");
    
    // Toast function
    function showToast(message) {
        let toast = document.createElement("div");
        toast.className = "toast-notify";
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Save/Load
    function saveAllData() {
        localStorage.setItem("coquette_products_luxe", JSON.stringify(products));
        localStorage.setItem("coquette_cart_luxe", JSON.stringify(cart));
        localStorage.setItem("coquette_background_luxe", currentBg);
        localStorage.setItem("coquette_favorites", JSON.stringify(favorites));
    }
    
    function loadAllData() {
        let savedProducts = localStorage.getItem("coquette_products_luxe");
        if(savedProducts) products = JSON.parse(savedProducts);
        let savedCart = localStorage.getItem("coquette_cart_luxe");
        if(savedCart) cart = JSON.parse(savedCart);
        let savedBg = localStorage.getItem("coquette_background_luxe");
        if(savedBg) currentBg = savedBg;
        let savedFav = localStorage.getItem("coquette_favorites");
        if(savedFav) favorites = JSON.parse(savedFav);
        applyBackground();
        updateCartUI();
    }
    
    function applyBackground() {
        if(currentBg.startsWith("http") || currentBg.startsWith("data:image")) {
            document.body.style.backgroundImage = `url('${currentBg}')`;
            document.body.style.backgroundSize = "cover";
            document.body.style.backgroundPosition = "center";
            document.body.style.backgroundAttachment = "fixed";
        } else {
            document.body.style.background = currentBg;
        }
    }
    
    function setNewBackground(newBg) {
        currentBg = newBg;
        applyBackground();
        saveAllData();
        showToast("✅ تم تغيير الخلفية بنجاح!");
    }
    
    function uploadImage(file) {
        if(!file.type.startsWith('image/')) {
            showToast("❌ الرجاء اختيار صورة");
            return;
        }
        const reader = new FileReader();
        reader.onload = (e) => setNewBackground(e.target.result);
        reader.readAsDataURL(file);
    }
    
    // Cart functions
    function updateCartUI() {
        let count = cart.reduce((s,i)=>s+i.qty,0);
        document.getElementById("cartCount").innerText = count;
        let container = document.getElementById("cartItemsList");
        if(cart.length===0) {
            container.innerHTML = "<p style='text-align:center'>السلة فارغة 💔</p>";
            document.getElementById("cartTotalPrice").innerText = "0.00 DH";
            return;
        }
        container.innerHTML = cart.map(item => `
            <div style="display:flex; gap:15px; background:#fff3f6; border-radius:28px; padding:12px; margin:12px 0;">
                <img src="${item.img}" style="width:70px; height:70px; border-radius:20px; object-fit:cover;">
                <div style="flex:1"><b>${item.name}</b><br>مقاس: ${item.size}<br>${item.finalPrice} DH x ${item.qty}</div>
                <button onclick="removeCartItem('${item.id}_${item.size}')" style="background:#ffb0c0; border:none; padding:0 16px; border-radius:40px;">حذف</button>
            </div>
        `).join('');
        let total = cart.reduce((s,i)=>s+(i.finalPrice*i.qty),0);
        let finalTotal = total * (1 - discountPercent/100);
        document.getElementById("cartTotalPrice").innerHTML = `${finalTotal.toFixed(2)} DH ${discountPercent>0 ? `<small style="font-size:0.8rem;">(خصم ${discountPercent}%)</small>` : ''}`;
    }
    
    window.removeCartItem = function(key) {
        cart = cart.filter(i => `${i.id}_${i.size}` !== key);
        saveAllData();
        renderProducts(document.getElementById("sortSelect").value);
        updateCartUI();
        showToast("🗑️ تم حذف المنتج من السلة");
    };
    
    function addToCart(product, size) {
        let finalPrice = product.price * (1 - product.discount/100);
        let existing = cart.find(i => i.id === product.id && i.size === size);
        if(existing) existing.qty++;
        else cart.push({ id: product.id, name: product.name, size, finalPrice, qty: 1, img: product.image });
        saveAllData();
        renderProducts(document.getElementById("sortSelect").value);
        updateCartUI();
        showToast(`✨ تمت الإضافة: ${product.name} - مقاس ${size}`);
        
        // Desktop notification
        if(Notification.permission === "granted") {
            new Notification("Choufha Luxe", { body: `تم إضافة ${product.name} إلى السلة` });
        }
    }
    
    // Wishlist
    function toggleFavorite(productId) {
        let index = favorites.indexOf(productId);
        if(index === -1) {
            favorites.push(productId);
            showToast("❤️ أضيف إلى المفضلة");
        } else {
            favorites.splice(index, 1);
            showToast("💔 أزيل من المفضلة");
        }
        saveAllData();
        renderProducts(document.getElementById("sortSelect").value);
    }
    
    // Share product
    function shareProduct(product) {
        let msg = `🛍️ شوفوا هذا المنتج الرائع: ${product.name} بسعر ${(product.price*(1-product.discount/100)).toFixed(2)} DH 🎀`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, "_blank");
    }
    
    // Apply discount
    document.getElementById("applyDiscountBtn")?.addEventListener("click", () => {
        let code = document.getElementById("discountCode").value;
        if(code === "COQUETTE10") {
            discountPercent = 10;
            showToast("🎉 تم تطبيق خصم 10%!");
        } else if(code === "WELCOME20") {
            discountPercent = 20;
            showToast("🎉 تم تطبيق خصم 20%!");
        } else {
            discountPercent = 0;
            showToast("❌ كود خصم غير صالح");
        }
        updateCartUI();
    });
    
    // Render products
    function renderProducts(sortType="default") {
        let grid = document.getElementById("productsGrid");
        let copy = [...products];
        if(sortType==="lowToHigh") copy.sort((a,b)=> (a.price*(1-a.discount/100)) - (b.price*(1-b.discount/100)));
        if(sortType==="highToLow") copy.sort((a,b)=> (b.price*(1-b.discount/100)) - (a.price*(1-a.discount/100)));
        
        grid.innerHTML = copy.map((p, idx) => {
            let final = (p.price*(1-p.discount/100)).toFixed(2);
            let isFav = favorites.includes(p.id);
            return `
            <div class="product-card" style="animation-delay: ${idx * 0.05}s; --index: ${idx}">
                <img class="product-img" src="${p.image}" onerror="this.src='https://placehold.co/600x600/pink?text=🌸'">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="product-title">${p.name}</div>
                    <button class="favorite-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(${p.id})">${isFav ? '❤️' : '🤍'}</button>
                </div>
                <div class="price-magic">
                    <span class="real-price">${final} DH</span>
                    ${p.discount>0 ? `<span class="old-price">${p.price} DH</span><span class="discount-chip" style="background:#ff8fae; border-radius:30px; padding:4px 12px;">-${p.discount}%</span>` : ''}
                </div>
                <div class="sizes-row">
                    ${p.sizes.map(sz => `<span class="size-pill" data-id="${p.id}" data-size="${sz}">${sz}</span>`).join('')}
                </div>
                <div style="display:flex; gap:10px; margin-top:12px;">
                    <button class="btn-add-cart" data-product='${JSON.stringify(p)}' style="flex:1;">➕ أضف للسلة</button>
                    <button class="share-btn" onclick="shareProduct(${JSON.stringify(p).replace(/"/g, '&quot;')})">📤 مشاركة</button>
                </div>
            </div>`;
        }).join('');
        
        document.querySelectorAll('.size-pill').forEach(el => {
            el.onclick = () => {
                let pid = parseInt(el.dataset.id);
                let sz = el.dataset.size;
                let prod = products.find(pr=>pr.id===pid);
                if(prod) addToCart(prod, sz);
            };
        });
        
        document.querySelectorAll('.btn-add-cart').forEach(btn => {
            btn.onclick = () => {
                let prodData = JSON.parse(btn.dataset.product);
                addToCart(prodData, prodData.sizes[0]);
            };
        });
    }
    
    // Admin panel
    function openAdmin() {
        let modal = document.getElementById("adminModal");
        let listDiv = document.getElementById("adminProductsList");
        listDiv.innerHTML = products.map(p => `
            <div style="background:#fff0f5; border-radius:40px; padding:15px; margin:12px 0">
                <input id="name_${p.id}" value="${p.name.replace(/"/g, '&quot;')}" placeholder="الاسم">
                <input id="price_${p.id}" value="${p.price}" type="number" placeholder="السعر">
                <input id="disc_${p.id}" value="${p.discount}" type="number" placeholder="التخفيض %">
                <input id="img_${p.id}" value="${p.image}" placeholder="رابط الصورة">
                <input id="sizes_${p.id}" value="${p.sizes.join(',')}" placeholder="المقاسات">
                <button onclick="updateProduct(${p.id})" style="background:#d47a9b; color:white;">💾 حفظ</button>
                <button onclick="deleteProduct(${p.id})" style="background:#ff8aaa;">🗑️ حذف</button>
            </div>
        `).join('');
        
        let displayDiv = document.getElementById("currentBgDisplay");
        displayDiv.innerHTML = `📌 الخلفية الحالية: ${currentBg.substring(0, 80)}...`;
        modal.style.display = "flex";
    }
    
    window.updateProduct = function(id) {
        let p = products.find(p=>p.id===id);
        if(p){
            p.name = document.getElementById(`name_${id}`).value;
            p.price = parseFloat(document.getElementById(`price_${id}`).value);
            p.discount = parseFloat(document.getElementById(`disc_${id}`).value);
            p.image = document.getElementById(`img_${id}`).value;
            p.sizes = document.getElementById(`sizes_${id}`).value.split(',').map(s=>s.trim());
            saveAllData();
            renderProducts(document.getElementById("sortSelect").value);
            openAdmin();
            showToast("✅ تم تحديث المنتج");
        }
    };
    
    window.deleteProduct = function(id){
        products = products.filter(p=>p.id!==id);
        saveAllData();
        renderProducts(document.getElementById("sortSelect").value);
        openAdmin();
        showToast("🗑️ تم حذف المنتج");
    };
    
    // Theme toggle
    document.getElementById("themeToggleBtn")?.addEventListener("click", () => {
        if(document.body.getAttribute("data-theme") === "dark") {
            document.body.removeAttribute("data-theme");
            localStorage.setItem("theme", "light");
            document.getElementById("themeToggleBtn").innerHTML = "🌙 وضع ليلي";
        } else {
            document.body.setAttribute("data-theme", "dark");
            localStorage.setItem("theme", "dark");
            document.getElementById("themeToggleBtn").innerHTML = "☀️ وضع نهاري";
        }
    });
    
    // Request notification permission
    if(Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
    }
    
    // Event listeners
    document.getElementById("openAdminBtn").onclick = openAdmin;
    document.getElementById("closeAdminBtn").onclick = () => document.getElementById("adminModal").style.display = "none";
    document.getElementById("addProductAdminBtn").onclick = () => {
        products.push({ id: Date.now(), name: "منتج كيوت جديد", price: 99, discount: 0, image: "https://placehold.co/600x600/FFC0D0/white?text=✨", sizes: ["M"], rating: 0, wishlist: false });
        saveAllData();
        renderProducts(document.getElementById("sortSelect").value);
        openAdmin();
        showToast("➕ تم إضافة منتج جديد");
    };
    document.getElementById("sortSelect").onchange = (e) => renderProducts(e.target.value);
    
    // Upload image
    let uploadArea = document.getElementById("uploadArea");
    let fileInput = document.getElementById("imageUpload");
    uploadArea.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        if(e.target.files && e.target.files[0]) uploadImage(e.target.files[0]);
    };
    
    // Cart controls
    document.getElementById("openCartBtn").onclick = () => {
        document.getElementById("cartDrawer").classList.add("open");
        document.getElementById("cartOverlay").style.display = "block";
    };
    document.getElementById("closeCartDrawer").onclick = () => {
        document.getElementById("cartDrawer").classList.remove("open");
        document.getElementById("cartOverlay").style.display = "none";
    };
    document.getElementById("cartOverlay").onclick = () => {
        document.getElementById("cartDrawer").classList.remove("open");
        document.getElementById("cartOverlay").style.display = "none";
    };
    
    function getCartWhatsMsg() {
        if(cart.length===0) return "مرحباً أريد طلب منتجات كيوت";
        let msg = "🎀 طلبي الجديد من شوفها لوكس 🎀%0A";
        cart.forEach(i=> { msg += `• ${i.name} (مقاس ${i.size}) - ${i.finalPrice} DH x ${i.qty} = ${(i.finalPrice*i.qty).toFixed(2)} DH%0A`; });
        let total = cart.reduce((s,i)=>s+(i.finalPrice*i.qty),0);
        let finalTotal = total * (1 - discountPercent/100);
        msg += `%0A💰 المجموع: ${finalTotal.toFixed(2)} DH%0A📍 العنوان: (اكتب عنوانك)`;
        return msg;
    }
    
    document.getElementById("globalWhatsappBtn").onclick = () => window.open(`https://wa.me/212600000000?text=${getCartWhatsMsg()}`, "_blank");
    document.getElementById("checkoutWhatsappBtn").onclick = () => window.open(`https://wa.me/212600000000?text=${getCartWhatsMsg()}`, "_blank");
    
    // Initialize
    loadAllData();
    renderProducts("default");
    showToast(`👋 أهلاً بك! عدد زوار المتجر: ${visitorCount}`);
</script>
</body>
</html>
