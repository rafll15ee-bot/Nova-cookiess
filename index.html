<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Choufha Co. – Coquette Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            transition: background-image 0.3s ease, background-color 0.3s ease;
            min-height: 100vh;
            padding: 30px 24px;
            position: relative;
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
        }

        body::before {
            content: "🎀";
            font-size: 120px;
            position: fixed;
            bottom: 10px;
            left: 10px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "🌸";
            font-size: 140px;
            position: fixed;
            top: 20px;
            right: 20px;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, #c96a8d, #9e4a6b, #e8a3bb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 15px rgba(255,200,220,0.6);
        }

        .header p {
            color: #b45f7c;
            background: rgba(255,250,245,0.6);
            backdrop-filter: blur(10px);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 60px;
            margin-top: 10px;
        }

        .glass-bar {
            background: rgba(255, 248, 245, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 100px;
            padding: 12px 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 45px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 5px 18px;
            border-radius: 60px;
        }

        .filter-group label {
            font-weight: 600;
            color: #b2486e;
        }

        select {
            background: transparent;
            border: none;
            padding: 8px 0;
            font-weight: 500;
            color: #a13e5c;
            outline: none;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 16px;
        }

        .cart-btn, .whatsapp-header, .admin-header-btn {
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            font-size: 0.9rem;
        }

        .cart-btn {
            background: #d47a9b;
            color: white;
            position: relative;
        }

        .cart-count-badge {
            background: #ff3b6f;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            position: absolute;
            top: -8px;
            right: -8px;
        }

        .whatsapp-header {
            background: #25D366;
            color: white;
        }

        .admin-header-btn {
            background: #f8e1e9;
            color: #b34164;
            border: 1px dashed #d47a9b;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 35px;
        }

        .product-card {
            background: rgba(255, 252, 250, 0.88);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 22px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 215, 225, 0.7);
            box-shadow: 0 20px 35px -15px rgba(100, 50, 70, 0.2);
        }

        .product-card:hover {
            transform: translateY(-12px);
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 30px 45px -12px rgba(150, 70, 100, 0.3);
        }

        .product-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 38px;
            background: #fad3df;
        }

        .product-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 12px;
            color: #a34468;
        }

        .price-magic {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin: 12px 0;
        }

        .real-price {
            font-size: 1.9rem;
            font-weight: 800;
            color: #c2577e;
        }

        .old-price {
            text-decoration: line-through;
            color: #bda2ab;
        }

        .discount-chip {
            background: #ff8fae;
            color: white;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
        }

        .sizes-row {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .size-pill {
            background: #ffecf0;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }

        .size-pill:hover {
            background: #d47a9b;
            color: white;
        }

        .btn-add-cart {
            width: 100%;
            background: #d47a9b;
            border: none;
            padding: 14px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 12px;
            cursor: pointer;
        }

        .cart-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: -500px;
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: #fffafc;
            z-index: 1001;
            transition: 0.35s;
            padding: 28px;
            overflow-y: auto;
            box-shadow: -10px 0 40px rgba(0,0,0,0.2);
            border-radius: 40px 0 0 40px;
        }

        .cart-drawer.open {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #ffcedb;
            padding-bottom: 15px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            background: #fff3f6;
            border-radius: 28px;
            padding: 12px;
            margin: 12px 0;
        }

        .cart-img {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            object-fit: cover;
        }

        .cart-total {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin: 20px 0;
            color: #b84a70;
        }

        .modal-admin {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-card {
            background: white;
            max-width: 700px;
            width: 90%;
            border-radius: 60px;
            padding: 28px;
            max-height: 85vh;
            overflow: auto;
        }

        input, textarea {
            width: 100%;
            margin: 8px 0;
            padding: 12px;
            border-radius: 50px;
            border: 1px solid #f0a6bc;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
        }

        .bg-preset {
            display: inline-block;
            background: #fcd5e1;
            padding: 8px 16px;
            border-radius: 40px;
            margin: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .bg-preset:hover {
            background: #d47a9b;
            color: white;
        }

        .upload-area {
            border: 2px dashed #f0a6bc;
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            margin: 15px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .upload-area:hover {
            background: #fff0f5;
            border-color: #d47a9b;
        }

        .current-bg-box {
            background: #f0eef2;
            padding: 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            word-break: break-all;
            margin: 10px 0;
            font-family: monospace;
        }

        .preview-img {
            max-width: 100%;
            max-height: 100px;
            border-radius: 20px;
            margin-top: 10px;
        }

        @media (max-width: 700px) {
            body { padding: 16px; }
            .header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body id="appBody">
<div class="container">
    <div class="header">
        <h1>🎀 CHOUFHA.CO 🎀</h1>
        <p>✨ coquette moroccan edits – درهم مغربي ✨</p>
    </div>

    <div class="glass-bar">
        <div class="filter-group">
            <label>🔮 رتبي:</label>
            <select id="sortSelect">
                <option value="default">✨ افتراضي</option>
                <option value="lowToHigh">📈 الأرخص أولاً</option>
                <option value="highToLow">📉 الأغلى أولاً</option>
            </select>
        </div>
        <div class="action-buttons">
            <button class="cart-btn" id="openCartBtn">🛍️ السلة <span id="cartCount" class="cart-count-badge">0</span></button>
            <button class="whatsapp-header" id="globalWhatsappBtn">📱 واتساب</button>
            <button class="admin-header-btn" id="openAdminBtn">👑 تعديل</button>
        </div>
    </div>

    <div id="productsGrid" class="products-grid"></div>
</div>

<!-- Cart -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
        <h2 style="color:#b84a70;">🛍️ سلة التسوق</h2>
        <button id="closeCartDrawer" style="background:#f0cfda; border:none; padding:6px 15px; border-radius:50px;">✖</button>
    </div>
    <div id="cartItemsList"></div>
    <div class="cart-total" id="cartTotalPrice">0.00 DH</div>
    <button id="checkoutWhatsappBtn" style="background:#25D366; width:100%; padding:14px; border:none; border-radius:50px; color:white; font-weight:bold;">📲 إرسال الطلب</button>
</div>

<!-- Admin Panel -->
<div id="adminModal" class="modal-admin">
    <div class="modal-card">
        <h2 style="color:#b84a70;">🌸 إدارة المتجر 🌸</h2>
        
        <div style="background:#ffeef4; border-radius:40px; padding:15px; margin:15px 0;">
            <h3>🎨 خلفية الموقع</h3>
            
            <div id="bgPresetsGallery"></div>
            
            <div class="upload-area" id="uploadArea">
                📸 اضغط هنا لاختيار صورة من جهازك<br>
                <small>(ستصبح خلفية الموقع فوراً)</small>
                <input type="file" id="imageUpload" accept="image/*" style="display:none">
            </div>
            
            <div id="currentBgDisplay" class="current-bg-box"></div>
        </div>
        
        <hr>
        <h3>📦 المنتجات</h3>
        <div id="adminProductsList"></div>
        <button id="addProductAdminBtn" style="background:#d47a9b; color:white; width:100%;">➕ إضافة منتج</button>
        <br><br>
        <button id="closeAdminBtn" style="background:#b5a0a8; width:100%;">إغلاق</button>
    </div>
</div>

<script>
    // ---------- DATA ----------
    let products = [
        { id: 1, name: "🌸 شنطة فيونكة حرير", price: 220, discount: 15, image: "https://placehold.co/600x600/FFB7C5/white?text=🎀", sizes: ["S","M"], rating: 4.9 },
        { id: 2, name: "💖 تيشرت قلوب", price: 139, discount: 0, image: "https://placehold.co/600x600/F9C7D3/white?text=❤️", sizes: ["XS","S","M","L"], rating: 4.7 },
        { id: 3, name: "🎀 طقم ربطة شعر", price: 69, discount: 25, image: "https://placehold.co/600x600/F4BAC7/white?text=🎀", sizes: ["One Size"], rating: 5.0 }
    ];
    
    let cart = [];
    
    // خلفيات جاهزة
    const PRESET_BGS = [
        "radial-gradient(circle at 10% 30%, #ffe9f0, #ffd9e4)",
        "linear-gradient(145deg, #ffe0e9, #ffd0dc)",
        "#fff0fa",
        "https://www.transparenttextures.com/patterns/cardboard.png"
    ];
    
    let currentBg = PRESET_BGS[0];

    // ========== FUNCTIONS ==========
    
    function saveAllData() {
        try {
            localStorage.setItem("coquette_products", JSON.stringify(products));
            localStorage.setItem("coquette_cart", JSON.stringify(cart));
            localStorage.setItem("coquette_background", currentBg);
            console.log("✅ تم الحفظ");
        } catch(e) { console.error("Save error:", e); }
    }
    
    function loadAllData() {
        try {
            let savedProducts = localStorage.getItem("coquette_products");
            if(savedProducts) products = JSON.parse(savedProducts);
            
            let savedCart = localStorage.getItem("coquette_cart");
            if(savedCart) cart = JSON.parse(savedCart);
            
            let savedBg = localStorage.getItem("coquette_background");
            if(savedBg && savedBg !== "") {
                currentBg = savedBg;
            } else {
                currentBg = PRESET_BGS[0];
            }
            
            applyBackgroundToPage();
            updateCartUI();
        } catch(e) { console.error("Load error:", e); }
    }
    
    function applyBackgroundToPage() {
        let body = document.body;
        if(currentBg.startsWith("http") && !currentBg.includes("gradient")) {
            body.style.backgroundImage = `url('${currentBg}')`;
            body.style.backgroundColor = "#ffe4ec";
            body.style.backgroundSize = "cover";
            body.style.backgroundPosition = "center";
            body.style.backgroundAttachment = "fixed";
            body.style.backgroundRepeat = "no-repeat";
        } else {
            body.style.backgroundImage = "none";
            body.style.background = currentBg;
            body.style.backgroundAttachment = "fixed";
        }
    }
    
    function setNewBackground(newBg) {
        if(!newBg || newBg === "") return false;
        currentBg = newBg;
        applyBackgroundToPage();
        saveAllData();
        
        let displayDiv = document.getElementById("currentBgDisplay");
        if(displayDiv) {
            let shortBg = currentBg.length > 100 ? currentBg.substring(0, 100) + "..." : currentBg;
            displayDiv.innerHTML = `✅ الخلفية الحالية:<br>${shortBg}`;
        }
        return true;
    }
    
    // رفع الصورة من الجهاز
    function uploadImageFromDevice(file) {
        if (!file) return;
        
        if (!file.type.startsWith('image/')) {
            alert("❌ الرجاء اختيار ملف صورة فقط (jpg, png, gif)");
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const imageUrl = e.target.result;
            setNewBackground(imageUrl);
            alert("✅ تم تغيير الخلفية بنجاح!");
        };
        reader.onerror = function() {
            alert("❌ حدث خطأ في قراءة الصورة");
        };
        reader.readAsDataURL(file);
    }
    
    function updateCartUI() {
        let count = cart.reduce((s,i)=>s+i.qty,0);
        document.getElementById("cartCount").innerText = count;
        let container = document.getElementById("cartItemsList");
        if(cart.length===0) { 
            container.innerHTML="<p style='text-align:center'>السلة فارغة 💔</p>"; 
            document.getElementById("cartTotalPrice").innerText="0.00 DH"; 
            return; 
        }
        container.innerHTML = cart.map(item => `
            <div class="cart-item">
                <img class="cart-img" src="${item.img}" onerror="this.src='https://placehold.co/200x200/pink'">
                <div style="flex:1"><b>${item.name}</b><br>مقاس: ${item.size}<br>${item.finalPrice} DH x ${item.qty}</div>
                <button onclick="removeCartItem('${item.id}_${item.size}')" style="background:#ffb0c0; border:none; padding:0 16px; border-radius:40px;">حذف</button>
            </div>
        `).join('');
        let total = cart.reduce((s,i)=>s+(i.finalPrice*i.qty),0);
        document.getElementById("cartTotalPrice").innerText = total.toFixed(2) + " DH";
    }
    
    window.removeCartItem = function(key) {
        cart = cart.filter(i => `${i.id}_${i.size}` !== key);
        saveAllData();
        renderProducts(document.getElementById("sortSelect").value);
        updateCartUI();
    };
    
    function addToCart(product, size) {
        let finalPrice = product.price * (1 - product.discount/100);
        let existing = cart.find(i => i.id === product.id && i.size === size);
        if(existing) existing.qty++;
        else cart.push({ id: product.id, name: product.name, size, finalPrice, qty: 1, img: product.image });
        saveAllData();
        renderProducts(document.getElementById("sortSelect").value);
        updateCartUI();
        alert(`✨ تمت الإضافة: ${product.name} - مقاس ${size}`);
    }
    
    function renderProducts(sortType="default") {
        let grid = document.getElementById("productsGrid");
        let copy = [...products];
        if(sortType==="lowToHigh") copy.sort((a,b)=> (a.price*(1-a.discount/100)) - (b.price*(1-b.discount/100)));
        if(sortType==="highToLow") copy.sort((a,b)=> (b.price*(1-b.discount/100)) - (a.price*(1-a.discount/100)));
        
        grid.innerHTML = copy.map(p => {
            let final = (p.price*(1-p.discount/100)).toFixed(2);
            return `
            <div class="product-card">
                <img class="product-img" src="${p.image}" onerror="this.src='https://placehold.co/600x600/pink?text=🌸'">
                <div class="product-title">${p.name}</div>
                <div class="price-magic">
                    <span class="real-price">${final} DH</span>
                    ${p.discount>0 ? `<span class="old-price">${p.price} DH</span><span class="discount-chip">-${p.discount}%</span>` : ''}
                </div>
                <div class="sizes-row">
                    ${p.sizes.map(sz => `<span class="size-pill" data-id="${p.id}" data-size="${sz}">${sz}</span>`).join('')}
                </div>
                <button class="btn-add-cart" data-product='${JSON.stringify(p)}'>➕ أضف للسلة</button>
            </div>`;
        }).join('');
        
        document.querySelectorAll('.size-pill').forEach(el => {
            el.onclick = () => {
                let pid = parseInt(el.dataset.id);
                let sz = el.dataset.size;
                let prod = products.find(pr=>pr.id===pid);
                if(prod) addToCart(prod, sz);
            };
        });
        
        document.querySelectorAll('.btn-add-cart').forEach(btn => {
            btn.onclick = () => {
                let prodData = JSON.parse(btn.dataset.product);
                addToCart(prodData, prodData.sizes[0]);
            };
        });
    }
    
    function openAdmin() {
        let modal = document.getElementById("adminModal");
        
        let bgGallery = document.getElementById("bgPresetsGallery");
        bgGallery.innerHTML = PRESET_BGS.map((bg, idx) => 
            `<span class="bg-preset" onclick="setPresetBg(${idx})">🎨 خلفية ${idx+1}</span>`
        ).join('');
        
        let displayDiv = document.getElementById("currentBgDisplay");
        let shortBg = currentBg.length > 100 ? currentBg.substring(0, 100) + "..." : currentBg;
        displayDiv.innerHTML = `📌 الخلفية الحالية:<br>${shortBg}`;
        
        let listDiv = document.getElementById("adminProductsList");
        listDiv.innerHTML = products.map(p => `
            <div style="background:#fff0f5; border-radius:40px; padding:15px; margin:12px 0">
                <input id="name_${p.id}" value="${p.name.replace(/"/g, '&quot;')}" placeholder="الاسم">
                <input id="price_${p.id}" value="${p.price}" type="number" placeholder="السعر">
                <input id="disc_${p.id}" value="${p.discount}" type="number" placeholder="التخفيض %">
                <input id="img_${p.id}" value="${p.image}" placeholder="رابط الصورة">
                <input id="sizes_${p.id}" value="${p.sizes.join(',')}" placeholder="المقاسات (مفصولة بفاصلة)">
                <button onclick="updateProduct(${p.id})" style="background:#d47a9b; color:white;">💾 حفظ</button>
                <button onclick="deleteProduct(${p.id})" style="background:#ff8aaa;">🗑️ حذف</button>
            </div>
        `).join('');
        
        modal.style.display = "flex";
    }
    
    window.setPresetBg = function(idx) {
        setNewBackground(PRESET_BGS[idx]);
        openAdmin();
    };
    
    window.updateProduct = function(id) {
        let p = products.find(p=>p.id===id);
        if(p){
            p.name = document.getElementById(`name_${id}`).value;
            p.price = parseFloat(document.getElementById(`price_${id}`).value);
            p.discount = parseFloat(document.getElementById(`disc_${id}`).value);
            p.image = document.getElementById(`img_${id}`).value;
            let sizesRaw = document.getElementById(`sizes_${id}`).value;
            p.sizes = sizesRaw.split(',').map(s=>s.trim());
            saveAllData();
            renderProducts(document.getElementById("sortSelect").value);
            openAdmin();
        }
    };
    
    window.deleteProduct = function(id){
        products = products.filter(p=>p.id!==id);
        saveAllData();
        renderProducts(document.getElementById("sortSelect").value);
        openAdmin();
    };
    
    // ========== EVENT LISTENERS ==========
    document.getElementById("openAdminBtn").onclick = openAdmin;
    document.getElementById("closeAdminBtn").onclick = () => document.getElementById("adminModal").style.display = "none";
    document.getElementById("addProductAdminBtn").onclick = () => {
        products.push({ id: Date.now(), name: "منتج كيوت جديد", price: 99, discount: 0, image: "https://placehold.co/600x600/FFC0D0/white?text=✨", sizes: ["M"], rating: 0 });
        saveAllData();
        renderProducts(document.getElementById("sortSelect").value);
        openAdmin();
    };
    document.getElementById("sortSelect").onchange = (e) => renderProducts(e.target.value);
    
    // رفع الصورة
    let uploadArea = document.getElementById("uploadArea");
    let fileInput = document.getElementById("imageUpload");
    
    uploadArea.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        if(e.target.files && e.target.files[0]) {
            uploadImageFromDevice(e.target.files[0]);
        }
    };
    
    // Cart controls
    document.getElementById("openCartBtn").onclick = () => { 
        document.getElementById("cartDrawer").classList.add("open"); 
        document.getElementById("cartOverlay").style.display = "block"; 
    };
    document.getElementById("closeCartDrawer").onclick = () => { 
        document.getElementById("cartDrawer").classList.remove("open"); 
        document.getElementById("cartOverlay").style.display = "none"; 
    };
    document.getElementById("cartOverlay").onclick = () => { 
        document.getElementById("cartDrawer").classList.remove("open"); 
        document.getElementById("cartOverlay").style.display = "none"; 
    };
    
    function getCartWhatsMsg() {
        if(cart.length===0) return "مرحباً أريد طلب منتجات كيوت";
        let msg = "🎀 طلبي الجديد من شوفها 🎀%0A";
        cart.forEach(i=> { msg += `• ${i.name} (مقاس ${i.size}) - ${i.finalPrice} DH x ${i.qty} = ${(i.finalPrice*i.qty).toFixed(2)} DH%0A`; });
        let total = cart.reduce((s,i)=>s+(i.finalPrice*i.qty),0);
        msg += `%0A💰 المجموع: ${total.toFixed(2)} DH%0A📍 العنوان: (اكتب عنوانك)`;
        return msg;
    }
    
    document.getElementById("globalWhatsappBtn").onclick = () => window.open(`https://wa.me/212600000000?text=${getCartWhatsMsg()}`, "_blank");
    document.getElementById("checkoutWhatsappBtn").onclick = () => window.open(`https://wa.me/212600000000?text=${getCartWhatsMsg()}`, "_blank");
    
    // ========== INIT ==========
    loadAllData();
    renderProducts("default");
</script>
</body>
</html>
