<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Coquette Bazar – متجر كيوت مغربي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, 'Poppins', sans-serif;
        }

        body {
            background: #ffe4ec;
            transition: all 0.3s ease;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            color: #b35f7b;
            text-align: center;
            margin-bottom: 10px;
        }

        .coquette-desc {
            text-align: center;
            color: #a75d7a;
            margin-bottom: 30px;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(255, 255, 240, 0.7);
            padding: 15px 20px;
            border-radius: 80px;
        }

        select, .admin-btn {
            background: white;
            border: 1px solid #f4acb7;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: bold;
            color: #a13e5c;
            cursor: pointer;
        }

        .admin-btn {
            background: #ffe0e7;
            border: 1px dashed #c96f8f;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .product-card {
            background: rgba(255, 250, 245, 0.95);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            border: 1px solid #ffd9e2;
        }

        .product-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 30px;
            background: #fce4eb;
            margin-bottom: 15px;
        }

        .product-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #9e4e6e;
        }

        .price-row {
            display: flex;
            gap: 12px;
            align-items: baseline;
            margin: 10px 0;
        }

        .price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #b34164;
        }

        .old-price {
            text-decoration: line-through;
            color: gray;
            font-size: 0.9rem;
        }

        .discount-badge {
            background: #ff8aaa;
            color: white;
            padding: 4px 8px;
            border-radius: 50px;
            font-size: 0.7rem;
        }

        .sizes {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .size-badge {
            background: #ffeef2;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 12px 0;
        }

        .stars {
            color: gold;
            font-size: 1.2rem;
        }

        .review-item {
            font-size: 0.75rem;
            background: #fff5f7;
            border-radius: 20px;
            padding: 8px;
            margin-top: 6px;
        }

        .add-review {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .add-review input, .add-review select {
            padding: 6px;
            border-radius: 20px;
            border: 1px solid #f0b7c4;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff0f3;
            max-width: 600px;
            width: 90%;
            padding: 25px;
            border-radius: 60px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 40px;
            border: 1px solid #f0a6bc;
        }

        .product-admin-item {
            background: #ffeef2;
            margin: 10px 0;
            padding: 10px;
            border-radius: 30px;
        }

        button {
            background: #d47a9b;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            cursor: pointer;
            margin: 5px;
        }

        .bg-option {
            display: inline-block;
            margin: 5px;
            padding: 6px 12px;
            background: #fcd5e1;
            border-radius: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body id="appBody">
<div class="container">
    <h1>🌸 CHOUFHA.CO 🌸</h1>
    <div class="coquette-desc">✨ coquette moroccan edits ✨</div>

    <div class="controls-row">
        <select id="sortSelect">
            <option value="default">الافتراضي</option>
            <option value="lowToHigh">من الأرخص للأغلى</option>
            <option value="highToLow">من الأغلى للأرخص</option>
        </select>
        <button id="openAdminBtn" class="admin-btn">👑 لوحة التحكم</button>
    </div>

    <div id="productsContainer" class="products-grid"></div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h2 style="color:#b14367;">✨ تعديل المتجر ✨</h2>
        
        <h3>🖼️ تغيير خلفية الموقع</h3>
        <div id="bgGallery"></div>
        <input type="text" id="customBgUrl" placeholder="رابط صورة خلفية">
        <button id="applyCustomBg">تطبيق الخلفية</button>
        <hr>
        
        <h3>📦 المنتجات</h3>
        <div id="adminProductsList"></div>
        <button id="addNewProductBtn">➕ إضافة منتج جديد</button>
        <button id="closeAdminBtn">إغلاق</button>
    </div>
</div>

<script>
    // المنتجات الافتراضية
    let products = [
        { id: 1, name: "شنطة فيونكة وردية", price: 120, discount: 10, image: "https://placehold.co/400x400/FFD1DC/white?text=🎀", sizes: ["S","M"], rating: 4.5, reviews: [{user:"Nour",rating:5,comment:"كيوت مرة!"}] },
        { id: 2, name: "تيشرت قلوب", price: 89, discount: 0, image: "https://placehold.co/400x400/F9C7D3/white?text=❤️", sizes: ["XS","S","M"], rating: 4, reviews: [] },
        { id: 3, name: "طقم ربطة شعر", price: 45, discount: 20, image: "https://placehold.co/400x400/F4BAC7/white?text=🎀", sizes: ["One Size"], rating: 5, reviews: [{user:"Imane",rating:5,comment:"حلو بزاف"}] }
    ];

    let backgroundList = ["#ffe4ec", "#ffd0dc", "#fff0f5"];
    let currentBg = backgroundList[0];

    function loadFromStorage() {
        let saved = localStorage.getItem("coquette_products");
        if(saved) products = JSON.parse(saved);
        let savedBg = localStorage.getItem("coquette_bg");
        if(savedBg) currentBg = savedBg;
        applyBackground();
    }

    function saveProducts() {
        localStorage.setItem("coquette_products", JSON.stringify(products));
    }

    function saveBg() {
        localStorage.setItem("coquette_bg", currentBg);
        applyBackground();
    }

    function applyBackground() {
        document.body.style.background = currentBg;
    }

    function renderProducts(sortType = "default") {
        let container = document.getElementById("productsContainer");
        let copy = [...products];
        if(sortType === "lowToHigh") copy.sort((a,b) => (a.price - a.price*a.discount/100) - (b.price - b.price*b.discount/100));
        if(sortType === "highToLow") copy.sort((a,b) => (b.price - b.price*b.discount/100) - (a.price - a.price*a.discount/100));
        
        container.innerHTML = copy.map(p => {
            let finalPrice = (p.price - (p.price * p.discount/100)).toFixed(2);
            let stars = "★".repeat(Math.floor(p.rating)) + "☆".repeat(5-Math.floor(p.rating));
            return `
            <div class="product-card">
                <img class="product-img" src="${p.image}" onerror="this.src='https://placehold.co/400x400/pink/white?text=🌸'">
                <div class="product-title">${p.name}</div>
                <div class="price-row">
                    <span class="price">${finalPrice} DH</span>
                    ${p.discount>0 ? `<span class="old-price">${p.price} DH</span><span class="discount-badge">-${p.discount}%</span>` : ''}
                </div>
                <div class="sizes">${p.sizes.map(s=>`<span class="size-badge">${s}</span>`).join('')}</div>
                <div class="rating"><span class="stars">${stars}</span> (${p.reviews.length})</div>
                <div>
                    ${p.reviews.map(r=>`<div class="review-item"><b>${r.user}</b> ${"★".repeat(r.rating)}: ${r.comment}</div>`).join('')}
                    <div class="add-review">
                        <input type="text" placeholder="اسمك" id="name_${p.id}" style="width:80px">
                        <select id="rate_${p.id}"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select>
                        <input type="text" placeholder="تعليق" id="comment_${p.id}" style="width:100px">
                        <button onclick="addReview(${p.id})">أضف</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    window.addReview = function(id) {
        let product = products.find(p=>p.id===id);
        if(product) {
            let name = document.getElementById(`name_${id}`).value.trim() || "عميلة";
            let rating = parseInt(document.getElementById(`rate_${id}`).value);
            let comment = document.getElementById(`comment_${id}`).value.trim() || "❤️ جميل";
            product.reviews.push({user: name, rating: rating, comment: comment});
            let total = product.reviews.reduce((s,r)=>s+r.rating,0)/product.reviews.length;
            product.rating = parseFloat(total.toFixed(1));
            saveProducts();
            renderProducts(document.getElementById("sortSelect").value);
        }
    };

    function openAdmin() {
        let modal = document.getElementById("adminModal");
        let listDiv = document.getElementById("adminProductsList");
        listDiv.innerHTML = products.map(p => `
            <div class="product-admin-item">
                <b>${p.name}</b><br>
                <input type="text" id="edit_name_${p.id}" value="${p.name}" placeholder="الاسم">
                <input type="number" id="edit_price_${p.id}" value="${p.price}">
                <input type="number" id="edit_discount_${p.id}" value="${p.discount}">
                <input type="text" id="edit_image_${p.id}" value="${p.image}" placeholder="رابط الصورة">
                <input type="text" id="edit_sizes_${p.id}" value="${p.sizes.join(',')}" placeholder="مقاسات مفصولة بفاصلة">
                <button onclick="updateProduct(${p.id})">💾 حفظ</button>
                <button onclick="deleteProduct(${p.id})">🗑️ حذف</button>
            </div>
        `).join('');
        
        document.getElementById("bgGallery").innerHTML = backgroundList.map((bg,i)=>`<span class="bg-option" onclick="setBg(${i})">خلفية ${i+1}</span>`).join('');
        modal.style.display = "flex";
    }

    window.setBg = function(i) {
        currentBg = backgroundList[i];
        saveBg();
        openAdmin();
    };

    window.applyCustomBg = function() {
        let url = document.getElementById("customBgUrl").value;
        if(url) {
            currentBg = url;
            backgroundList.push(url);
            saveBg();
            openAdmin();
        }
    };

    window.updateProduct = function(id) {
        let p = products.find(p=>p.id===id);
        if(p) {
            p.name = document.getElementById(`edit_name_${id}`).value;
            p.price = parseFloat(document.getElementById(`edit_price_${id}`).value);
            p.discount = parseFloat(document.getElementById(`edit_discount_${id}`).value);
            p.image = document.getElementById(`edit_image_${id}`).value;
            p.sizes = document.getElementById(`edit_sizes_${id}`).value.split(',').map(s=>s.trim());
            saveProducts();
            renderProducts(document.getElementById("sortSelect").value);
            openAdmin();
        }
    };

    window.deleteProduct = function(id) {
        products = products.filter(p=>p.id!==id);
        saveProducts();
        renderProducts(document.getElementById("sortSelect").value);
        openAdmin();
    };

    document.getElementById("openAdminBtn").onclick = openAdmin;
    document.getElementById("closeAdminBtn").onclick = () => document.getElementById("adminModal").style.display = "none";
    document.getElementById("addNewProductBtn").onclick = () => {
        products.push({ id: Date.now(), name: "منتج جديد", price: 50, discount: 0, image: "https://placehold.co/400x400/FFB7C5/white?text=✨", sizes: ["M"], rating: 0, reviews: [] });
        saveProducts();
        openAdmin();
        renderProducts(document.getElementById("sortSelect").value);
    };
    document.getElementById("applyCustomBg").onclick = applyCustomBg;
    document.getElementById("sortSelect").onchange = (e) => renderProducts(e.target.value);

    loadFromStorage();
    renderProducts("default");

    window.onclick = function(e) {
        let modal = document.getElementById("adminModal");
        if(e.target === modal) modal.style.display = "none";
    };
</script>
</body>
</html>
