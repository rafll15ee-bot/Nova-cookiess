<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Cookies | Professional Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f8ecee; --rose: #8d5b5e; --white: #ffffff; }
        body { margin: 0; background-color: var(--primary); background-image: url('18746.jpg'); background-size: cover; background-attachment: fixed; font-family: 'Montserrat', sans-serif; color: var(--rose); }
        .container { max-width: 800px; margin: 50px auto; background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 30px; border: 1px solid var(--rose); text-align: center; position: relative; }
        .frame { width: 180px; height: 230px; margin: 0 auto 20px; border: 8px solid var(--white); outline: 1px solid var(--rose); overflow: hidden; }
        .frame img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 4rem; margin: 0; }
        .services { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .card { background: var(--white); padding: 20px; border-radius: 10px; border: 1px dashed var(--rose); }
        .button { display: inline-block; margin-top: 30px; padding: 12px 40px; background: var(--rose); color: var(--white); text-decoration: none; border-radius: 50px; font-weight: bold; }
        .decor { position: absolute; width: 60px; opacity: 0.6; }
        .t-l { top: -15px; left: -15px; } .t-r { top: -15px; right: -15px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="18181.jpg" class="decor t-l">
        <img src="18181.jpg" class="decor t-r">
        <div class="frame"><img src="18771.png"></div>
        <h1>Nova Cookies</h1>
        <p>Premium Aesthetic Web Solutions</p>
        <div class="services">
            <div class="card"><h3>Web Design</h3><p>Custom Coquette & Victorian styles.</p></div>
            <div class="card"><h3>Branding</h3><p>Elevating your professional identity.</p></div>
        </div>
        <a href="#" class="button">Contact Agency</a>
    </div>
</body>
</html>
